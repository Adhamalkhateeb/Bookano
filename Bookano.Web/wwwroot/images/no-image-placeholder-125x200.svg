<svg xmlns="http://www.w3.org/2000/svg" width="125" height="200" viewBox="0 0 125 200">
  <!-- Background -->
  <rect width="125" height="200" rx="6" ry="6" fill="#eeeeee"/>

  <!-- Photo icon group, centered -->
  <g transform="translate(62.5, 88)">
    <!-- Photo frame -->
    <rect x="-28" y="-30" width="56" height="46" rx="3" ry="3"
          fill="#c2c2c2" stroke="#ffffff" stroke-width="2.5"/>

    <!-- Sky area (top half of photo, white) -->
    <rect x="-28" y="-30" width="56" height="22" rx="3" ry="3"
          fill="#ffffff"/>

    <!-- Mountain landscape lines -->
    <polyline points="-28,16 -18,0 -4,-10 4,-3 12,-18 28,16"
              fill="#cccccc" stroke="#ffffff" stroke-width="1.5"
              stroke-linejoin="round"/>
    <polyline points="-4,16 8,4 14,8 28,-4 28,16"
              fill="#b3b3b3" stroke="#ffffff" stroke-width="1.5"
              stroke-linejoin="round"/>

    <!-- Sun circle -->
    <circle cx="-14" cy="-18" r="6" fill="#cccccc" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- "NO IMAGE" text -->
  <text x="62.5" y="148"
        font-family="sans-serif" font-weight="bold" font-size="11"
        fill="#767676" text-anchor="middle">NO IMAGE</text>
  <text x="62.5" y="163"
        font-family="sans-serif" font-weight="bold" font-size="11"
        fill="#767676" text-anchor="middle">AVAILABLE</text>
</svg>
